<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>登录</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; margin: 0; background: #f5f7fb; color: #1f2937; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { width: 100%; max-width: 360px; background: #fff; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,.08); padding: 24px; }
    h1 { margin: 0 0 16px; font-size: 24px; }
    p { margin: 0 0 16px; color: #6b7280; }
    label { display: block; margin: 12px 0 6px; font-size: 14px; }
    input { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; }
    button { width: 100%; margin-top: 16px; padding: 10px 12px; border: 0; border-radius: 8px; background: #2563eb; color: #fff; cursor: pointer; }
    .error { margin-top: 12px; color: #b91c1c; font-size: 14px; }
    .hint { margin-top: 12px; font-size: 13px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="wrap">
    <form class="card" method="post">
      <h1>A股监控系统</h1>
      <p>最小可用版登录页面</p>
      <label for="username">用户名</label>
      <input id="username" name="username" type="text" required>
      <label for="password">密码</label>
      <input id="password" name="password" type="password" required>
      <button type="submit">登录</button>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <div class="hint">默认账号：admin / admin123</div>
    </form>
  </div>
</body>
</html>
