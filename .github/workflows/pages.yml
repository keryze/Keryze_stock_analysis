name: Analyze and Deploy Pages

on:
  workflow_dispatch:        # 支持在 Actions 页面手动点击运行


# GitHub Pages 部署所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只保留一个部署，不打断正在进行的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      EASTMONEY_COOKIE: ${{ secrets.EASTMONEY_COOKIE }}
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # tinyshare 2.5.x 要求 Python >=3.12（旧版只支持 <3.11，3.11 无可用版本）
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pandas<3" numpy akshare requests
          # tinyshare 不在 PyPI（已被隔离），需从其官方专用源安装
          pip install tinyshare --extra-index-url https://minidoc.pages.dev/simple/

      - name: Run analysis
        # 即使数据拉取/分析失败，也继续部署（页面会展示上一次数据或空状态）
        continue-on-error: true
        run: python scripts/run_selectors.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: scripts/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
