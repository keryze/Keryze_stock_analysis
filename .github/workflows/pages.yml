name: Analyze and Deploy Pages

on:
  workflow_dispatch:        # 支持在 Actions 页面手动点击运行


# GitHub Pages 部署 + 把历史结果提交回仓库所需权限
permissions:
  contents: write
  pages: write
  id-token: write

# 同一时间只保留一个部署，不打断正在进行的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # 公开仓库 Actions 免费；2核跑机比本地慢很多，全市场分析需要几小时（上限6小时）
    timeout-minutes: 350
    env:
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      EASTMONEY_COOKIE: ${{ secrets.EASTMONEY_COOKIE }}
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      # 中长线只分析流动性最高的这么多只股票（2核跑机全市场跑不完）。
      # 想分析更多就调大；设为 0 表示不预筛、分析全市场（可能超时）。
      LONG_TERM_MAX_UNIVERSE: "1000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # tinyshare 2.5.x 要求 Python >=3.12（旧版只支持 <3.11，3.11 无可用版本）
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pandas<3" numpy akshare requests
          # tinyshare 不在 PyPI（已被隔离），需从其官方专用源安装
          pip install tinyshare --extra-index-url https://minidoc.pages.dev/simple/

      - name: Run analysis
        # 即使数据拉取/分析失败或超时，也继续部署（页面会展示已生成的部分结果）
        continue-on-error: true
        timeout-minutes: 335
        run: python scripts/run_selectors.py

      - name: Archive results back to repo
        # 把当日结果(含 history/ 存档)提交回仓库，让历史跨次累积
        if: always()
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/site/data
          if git diff --staged --quiet; then
            echo "无新结果，跳过提交"
          else
            git commit -m "chore: archive results $(date -u +%Y%m%d) [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: scripts/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
