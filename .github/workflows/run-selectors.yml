name: Run Selectors

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
      EASTMONEY_COOKIE: ${{ secrets.EASTMONEY_COOKIE }}
      EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      FLASK_SECRET_KEY: ${{ secrets.FLASK_SECRET_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          # tinyshare 2.5.x 要求 Python >=3.12（旧版只支持 <3.11，3.11 无可用版本）
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "pandas<3" numpy akshare flask flask-login requests
          # tinyshare 不在 PyPI（已被隔离），需从其官方专用源安装
          pip install tinyshare --extra-index-url https://minidoc.pages.dev/simple/

      - name: Run selectors pipeline
        run: python scripts/run_selectors.py

      - name: Upload recommend reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recommend-reports
          path: scripts/recommend/*.txt
          if-no-files-found: ignore
